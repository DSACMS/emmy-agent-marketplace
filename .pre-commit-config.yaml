minimum_pre_commit_version: "4.0.0"

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-json
      - id: check-toml
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  - repo: local
    hooks:
      - id: format-check
        name: Check formatting with Prettier
        entry: pnpm run format:check
        language: system
        pass_filenames: false

      - id: markdownlint
        name: Lint Markdown
        entry: pnpm run lint:markdown
        language: system
        pass_filenames: false

      - id: validate-marketplace
        name: Validate marketplace catalogs and skills
        entry: pnpm run validate
        language: system
        pass_filenames: false
